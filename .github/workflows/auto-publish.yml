name: Auto Publish Content

on:
  schedule:
    - cron: '0 8 * * 1'   # Monday 8am UTC
    - cron: '0 8 * * 3'   # Wednesday 8am UTC
    - cron: '0 8 * * 5'   # Friday 8am UTC
    - cron: '0 9 * * 0'   # Sunday 9am UTC — weekly report
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * 0' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send weekly report email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: node agent/weekly-report.mjs

  publish:
    if: github.event.schedule != '0 9 * * 0'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run master agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node agent/master-agent.mjs

      - name: Notify success via GitHub issue
        if: success()
        run: |
          gh issue create \
            --title "✅ Agent published new content - $(date +%Y-%m-%d)" \
            --body "New content was published automatically on aitoolduel.com. Check: https://www.aitoolduel.com" \
            --label "auto-publish" \
            --repo saivikas373/aitoolduel || true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Notify failure via GitHub issue
        if: failure()
        run: |
          gh issue create \
            --title "❌ Agent FAILED - $(date +%Y-%m-%d) - ACTION NEEDED" \
            --body "The auto-publish agent failed today. Check logs: https://github.com/saivikas373/aitoolduel/actions" \
            --label "bug" \
            --repo saivikas373/aitoolduel || true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
